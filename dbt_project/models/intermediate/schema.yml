version: 2

models:
  - name: int_ratings_unified
    description: "Unified ratings table combining user ratings from both sources, with duplicates removed and a source column added."
    columns:
      - name: movie_id
        description: "Unique identifier for each movie."
        tests:
          - not_null
      - name: user_id
        description: "Unique identifier for each user."
        tests:
          - not_null
      - name: rating_ts
        description: "Timestamp of when the rating was given."
        tests:
          - not_null
      - name: rating
        description: "Rating given by the user to the movie."
        tests:
          - not_null
          - accepted_values:
              values: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0]

  - name: int_movie_kpi
    description: "KPIs for each movie based on user ratings."
    columns:
      - name: movie_id
        description: "Unique identifier for each movie."
        tests:
          - not_null
