version: 2

sources:
  - name: raw
    schema: raw
    description: "The raw data source, ingested from CSV files."
    tables:
      - name: movies
        description: "placeholder"
      - name: ratings_for_additional_users
        description: "placeholder"
      - name: user_rating_history
        description: "placeholder"
models:
  - name: stg_movies
    description: "Cleaned movie catalog from the raw movies table."
    columns:
      - name: movie_id
        description: "Unique identifier for each movie."
        tests:
          - unique
          - not_null
  - name: stg_user_rating_history
    description: "Cleaned user rating history from the raw user rating history table."
    columns:
      - name: movie_id
        description: "Unique identifier for each movie."
        tests:
          - unique
          - not_null
      - name: user_id
        description: "Unique identifier for each user."
        tests:
          - not_null
      - name: rating
        description: "Rating given by the user to the movie."
        tests:
          - not_null
          - accepted_values:
              values: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0]
      - name: tstamp
        description: "Timestamp of when the rating was given."
        tests:
          - not_null
  - name: stg_ratings_for_additional_users
    description: "Cleaned ratings for additional users from the raw user rating history table."
    columns:
      - name: movie_id
        description: "Unique identifier for each movie."
        tests:
          - not_null
      - name: user_id
        description: "Unique identifier for each user."
        tests:
          - not_null
      - name: rating_ts
        description: "Timestamp of when the rating was given."
        tests:
          - not_null
      - name: tstamp
        description: "Timestamp of when the rating was given."
        tests:
          - not_null
  - name: int_user_unified
    description: "Unified user rating history, combining stg_user_rating_history and stg_ratings_for_additional_users."
    columns:
      - name: movie_id
        description: "Unique identifier for each movie."
        tests:
          - not_null
      - name: user_id
        description: "Unique identifier for each user."
        tests:
          - not_null
      - name: rating_ts
        description: "Timestamp of when the rating was given."
        tests:
          - not_null
      - name: tstamp
        description: "Timestamp of when the rating was given."
        tests:
          - not_null
  - name: int_movie_kpi
    description: "KPIs for each movie based on user ratings."
    columns:
      - name: movie_id
        description: "Unique identifier for each movie."
        tests:
          - not_null
  - name: mart_top_movies
    description: "Top movies based on user ratings."
    columns:
      - name: movie_id
        description: "Unique identifier for each movie."
        tests:
          - not_null
  - name: mart_popularity_vs_quality
    description: "Analysis of movie popularity vs quality based on user ratings."
    columns:
      - name: movie_id
        description: "Unique identifier for each movie."
        tests:
          - not_null
  - name: mart_ratings_heatmap
    description: "Heatmap of user ratings for each movie."
    columns:
      - name: year
        description: "Year of the rating."
        tests:
          - not_null  
      - name: month_number
        description: "Month number of the rating."
        tests:
          - not_null
      - name: month_name
        description: "Month name of the rating."
        tests:
          - not_null
      - name: total_ratings
        description: "Total number of ratings for the movie."
        tests:
          - not_null
  - name: mart_user_activity
    description: "Analysis of user activity based on their rating history."