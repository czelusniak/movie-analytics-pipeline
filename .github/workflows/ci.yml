# CI: Data Quality Gates
#
# Runs on every push to main and on every pull request.
# Fails the build if any dbt test fails — this prevents bad data from merging.
#
# What this teaches you:
#   - How to run dbt tests in a CI environment
#   - How to use DuckDB in-memory for fast CI (no persistent file needed)
#   - How to cache Python dependencies to speed up CI runs

name: dbt Test + Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt-test:
    name: dbt test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install dbt-duckdb>=1.8.0 duckdb>=0.10.0

      # In CI we load sample data (small CSVs) instead of the full dataset.
      # This keeps the CI run fast (< 1 minute).
      - name: Load sample data into DuckDB
        run: python ingestion/load_to_duckdb.py
        env:
          RAW_DATA_DIR: data/sample      # Use sample CSVs in CI
          DUCKDB_PATH: data/warehouse.duckdb

      - name: Run dbt models
        working-directory: dbt_project
        run: dbt run --profiles-dir . --project-dir .

      - name: Run dbt tests
        working-directory: dbt_project
        run: dbt test --profiles-dir . --project-dir .

